name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    name: Test and Package
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check tracked files for secrets
        run: scripts/check-secrets.sh

      - name: Run tests
        run: swift test --jobs 1

      - name: Build app bundle
        run: SWIFT_BUILD_FLAGS="--jobs 1" scripts/build-app.sh
